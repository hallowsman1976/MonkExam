<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ระบบตรวจสุขภาพพระสงฆ์</title>
    
    <!-- Google Fonts: Noto Sans Thai (Clean & Modern) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- FontAwesome (Minimal Usage) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Tailwind Config for Apple-like Aesthetics -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', '"Noto Sans Thai"', 'Helvetica', 'Arial', 'sans-serif'],
                    },
                    colors: {
                        apple: {
                            bg: '#f5f5f7',
                            card: 'rgba(255, 255, 255, 0.7)',
                            glass: 'rgba(255, 255, 255, 0.85)',
                            text: '#1d1d1f',
                            textMuted: '#86868b',
                            blue: '#0071e3',
                            blueHover: '#0077ED',
                            green: '#34c759',
                            orange: '#ff9500',
                            red: '#ff3b30'
                        }
                    },
                    boxShadow: {
                        'soft': '0 8px 32px 0 rgba(0, 0, 0, 0.04)',
                        'hover': '0 12px 40px 0 rgba(0, 0, 0, 0.08)',
                        'glass': '0 4px 24px -1px rgba(0, 0, 0, 0.05)'
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        :root {
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
            --ease-ios: cubic-bezier(0.32, 0.72, 0, 1);
        }

        body {
            background-color: #f5f5f7;
            color: #1d1d1f;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overscroll-behavior-y: none;
            letter-spacing: -0.01em;
            /* Restrained, near-monochrome ambient light — one cool accent, one warm.
               No tri-color glow (that's the "AI template" tell). */
            background-image:
                radial-gradient(at 8% -5%, hsla(210, 60%, 92%, 0.55) 0px, transparent 45%),
                radial-gradient(at 95% 8%, hsla(28, 70%, 94%, 0.40) 0px, transparent 42%),
                radial-gradient(at 50% 110%, hsla(220, 30%, 90%, 0.35) 0px, transparent 55%);
            background-attachment: fixed;
        }

        /* Tabular numerals so animated counters don't jitter */
        .counter, .tabular { font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }

        /* Glassmorphism — layered depth (ambient + key light + inner sheen) */
        .glass-panel {
            background: rgba(255, 255, 255, 0.72);
            backdrop-filter: blur(24px) saturate(160%);
            -webkit-backdrop-filter: blur(24px) saturate(160%);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow:
                0 1px 1px rgba(0, 0, 0, 0.02),
                0 8px 24px -8px rgba(17, 24, 39, 0.10),
                inset 0 1px 0 rgba(255, 255, 255, 0.7);
        }

        .glass-header {
            background: rgba(245, 245, 247, 0.72);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid rgba(0, 0, 0, 0.06);
        }

        /* Card hover — subtle lift, lighter glass, brighter edge */
        .card-hover-effect {
            transition: transform 0.5s var(--ease-out-expo),
                        box-shadow 0.5s var(--ease-out-expo),
                        background 0.5s var(--ease-out-expo);
            will-change: transform;
        }
        .card-hover-effect:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.9);
            box-shadow:
                0 2px 2px rgba(0, 0, 0, 0.02),
                0 20px 44px -12px rgba(17, 24, 39, 0.16),
                inset 0 1px 0 rgba(255, 255, 255, 0.9);
        }
        @media (hover: none) { .card-hover-effect:hover { transform: none; } }

        /* Apple-style Inputs */
        .input-apple {
            @apply w-full px-4 py-3.5 text-[15px] bg-white/90 border border-gray-200/80 rounded-2xl focus:outline-none focus:ring-4 focus:ring-apple-blue/15 focus:border-apple-blue transition-all duration-300;
            box-shadow: inset 0 1px 2px rgba(17, 24, 39, 0.04);
        }
        /* Labels: NO uppercase / NO letter-spacing — both break Thai script.
           Quiet, medium-weight muted label instead. */
        .label-apple { @apply block text-[13px] font-semibold text-apple-textMuted mb-1.5 ml-1; letter-spacing: 0; }

        /* Modern Buttons */
        .btn-apple-primary {
            @apply w-full bg-apple-blue hover:bg-apple-blueHover text-white font-semibold py-3.5 px-6 rounded-2xl transition-all duration-300 active:scale-[0.97] text-base flex items-center justify-center;
            box-shadow: 0 1px 1px rgba(0,0,0,0.04), 0 8px 20px -6px rgba(0, 113, 227, 0.55);
        }
        .btn-apple-secondary {
            @apply w-full bg-white/80 hover:bg-white border border-gray-200 text-apple-text font-semibold py-3.5 px-6 rounded-2xl transition-all duration-300 active:scale-[0.97] text-base flex items-center justify-center shadow-sm;
        }

        /* Floating Nav Island */
        .nav-island {
            background: rgba(255, 255, 255, 0.78);
            backdrop-filter: blur(28px) saturate(180%);
            -webkit-backdrop-filter: blur(28px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow:
                0 1px 1px rgba(0,0,0,0.04),
                0 16px 40px -8px rgba(17, 24, 39, 0.22),
                inset 0 1px 0 rgba(255,255,255,0.8);
        }

        /* Loading Screen Premium */
        #loader {
            display: none; position: fixed; inset: 0;
            background: rgba(245, 245, 247, 0.55);
            backdrop-filter: blur(12px) saturate(160%); -webkit-backdrop-filter: blur(12px) saturate(160%);
            z-index: 9999; justify-content: center; align-items: center; flex-direction: column;
            animation: loaderFade 0.3s ease-out;
        }
        @keyframes loaderFade { from { opacity: 0; } to { opacity: 1; } }

        /* Authentic iOS segmented spinner (12 fading bars) */
        .apple-spinner {
            width: 30px; height: 30px; position: relative;
        }
        .apple-spinner span {
            position: absolute; left: 50%; top: 50%;
            width: 2.5px; height: 8px; border-radius: 2px;
            background: #8a8a8e;
            transform-origin: 50% 13px;
            animation: iosFade 1s linear infinite;
        }
        @keyframes iosFade { 0% { opacity: 1; } 100% { opacity: 0.15; } }

        /* Step Indicators */
        .step-dot { @apply w-2 h-2 rounded-full transition-all duration-500; transition-timing-function: var(--ease-out-expo); }
        .step-dot-active { @apply w-7 bg-apple-blue; }
        .step-dot-inactive { @apply bg-gray-300; }

        /* Custom Checkbox (Pill style) */
        .pill-checkbox input:checked + div {
            @apply bg-apple-blue text-white border-apple-blue;
            box-shadow: 0 4px 12px -2px rgba(0, 113, 227, 0.5);
            transform: scale(1.04);
        }
        .pill-checkbox div { @apply transition-all duration-300; transition-timing-function: var(--ease-out-expo); }

        /* Hide scrollbar */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 100px); }
        .pt-safe { padding-top: env(safe-area-inset-top, 20px); }

        /* Badges */
        .badge-premium { @apply px-3 py-1 text-[11px] font-bold rounded-full border shadow-sm backdrop-blur-md inline-flex items-center; }
        .bp-green { @apply bg-green-50/80 text-green-700 border-green-200/50; }
        .bp-yellow { @apply bg-yellow-50/80 text-yellow-700 border-yellow-200/50; }
        .bp-orange { @apply bg-orange-50/80 text-orange-700 border-orange-200/50; }
        .bp-red { @apply bg-red-50/80 text-red-700 border-red-200/50; }
        .bp-gray { @apply bg-gray-50/80 text-gray-600 border-gray-200/50; }

        /* Entrance choreography — staggered fade + rise */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .fade-in > * { opacity: 0; animation: fadeUp 0.7s var(--ease-out-expo) forwards; }
        .fade-in > *:nth-child(1) { animation-delay: 0.05s; }
        .fade-in > *:nth-child(2) { animation-delay: 0.13s; }
        .fade-in > *:nth-child(3) { animation-delay: 0.21s; }
        .fade-in > *:nth-child(4) { animation-delay: 0.29s; }
        .reveal { opacity: 0; animation: fadeUp 0.6s var(--ease-out-expo) forwards; }

        /* Skeleton shimmer (for list loading) */
        .skeleton {
            background: linear-gradient(100deg, rgba(0,0,0,0.04) 30%, rgba(0,0,0,0.08) 50%, rgba(0,0,0,0.04) 70%);
            background-size: 200% 100%;
            animation: shimmer 1.4s ease-in-out infinite;
        }
        @keyframes shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
        }

    </style>
</head>
<body class="min-h-screen relative pb-32">

    <!-- Premium Loader -->
    <div id="loader" class="flex">
        <div class="glass-panel px-7 py-6 rounded-3xl flex flex-col items-center justify-center">
            <div class="apple-spinner mb-4" id="iosSpinner"></div>
            <div class="text-[13px] font-semibold text-apple-textMuted">กำลังเชื่อมต่อข้อมูล</div>
        </div>
    </div>
    <script>
        // Build the 12 fading bars of the iOS-style spinner
        (function () {
            const s = document.getElementById('iosSpinner');
            for (let i = 0; i < 12; i++) {
                const bar = document.createElement('span');
                bar.style.transform = `translate(-50%, -50%) rotate(${i * 30}deg)`;
                bar.style.animationDelay = `${(-11 + i) / 12}s`;
                s.appendChild(bar);
            }
        })();
    </script>

    <!-- Header (Sticky Glass) -->
    <header class="glass-header sticky top-0 z-40 pt-safe">
        <div class="px-6 py-4 flex justify-between items-center max-w-2xl mx-auto">
            <div>
                <h1 class="text-xl font-bold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-gray-900 to-gray-500">ระบบตรวจสุขภาพพระสงฆ์</h1>
                <p class="text-[12px] text-apple-textMuted font-medium mt-0.5" id="currentDate">--</p>
            </div>
            <div class="w-10 h-10 rounded-full bg-white shadow-sm border border-gray-100 flex items-center justify-center text-apple-blue">
                <i class="fa-solid fa-leaf text-lg"></i>
            </div>
        </div>
    </header>

    <main class="w-full max-w-2xl mx-auto px-4 mt-6 relative z-10">
        
        <!-- =======================
             SECTION: DASHBOARD
             ======================= -->
        <section id="section-dashboard" class="space-y-6 fade-in">
            
            <!-- Hero Stats -->
            <div class="grid grid-cols-2 gap-4">
                <div class="glass-panel rounded-3xl p-5 card-hover-effect relative overflow-hidden group">
                    <div class="absolute -right-6 -top-6 w-24 h-24 bg-apple-blue/10 rounded-full blur-2xl group-hover:bg-apple-blue/20 transition-colors duration-500"></div>
                    <div class="w-9 h-9 rounded-xl bg-apple-blue/10 text-apple-blue flex items-center justify-center text-base mb-3"><i class="fa-solid fa-users"></i></div>
                    <div class="text-[12px] text-apple-textMuted font-semibold">พระสงฆ์ (รูป)</div>
                    <div class="text-[2.75rem] leading-none font-bold mt-1.5 tracking-tight counter bg-clip-text text-transparent bg-gradient-to-br from-gray-900 to-gray-500" id="dash-total">0</div>
                </div>
                <div class="glass-panel rounded-3xl p-5 card-hover-effect relative overflow-hidden group">
                    <div class="absolute -right-6 -top-6 w-24 h-24 bg-apple-green/10 rounded-full blur-2xl group-hover:bg-apple-green/20 transition-colors duration-500"></div>
                    <div class="w-9 h-9 rounded-xl bg-apple-green/10 text-apple-green flex items-center justify-center text-base mb-3"><i class="fa-solid fa-vihara"></i></div>
                    <div class="text-[12px] text-apple-textMuted font-semibold">วัด (แห่ง)</div>
                    <div class="text-[2.75rem] leading-none font-bold mt-1.5 tracking-tight counter bg-clip-text text-transparent bg-gradient-to-br from-gray-900 to-gray-500" id="dash-temples">0</div>
                </div>
            </div>

            <!-- Health Summary (List style like Apple Health) -->
            <div>
                <h3 class="text-[13px] font-bold text-apple-textMuted mb-3 ml-2">สรุปความเสี่ยงสุขภาพ</h3>
                <div class="glass-panel rounded-3xl p-2 shadow-sm">
                    
                    <div class="flex items-center justify-between p-3 px-4 hover:bg-black/[0.02] rounded-2xl transition-colors">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full bg-orange-100 flex items-center justify-center text-orange-500"><i class="fa-solid fa-weight-scale text-sm"></i></div>
                            <span class="font-semibold text-[15px]">BMI เกินเกณฑ์</span>
                        </div>
                        <div class="font-bold text-xl text-apple-text"><span class="counter" id="dash-bmi">0</span></div>
                    </div>
                    
                    <div class="w-full h-[1px] bg-gray-100/80 my-0.5 ml-14"></div>

                    <div class="flex items-center justify-between p-3 px-4 hover:bg-black/[0.02] rounded-2xl transition-colors">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full bg-red-100 flex items-center justify-center text-red-500"><i class="fa-solid fa-heart-pulse text-sm"></i></div>
                            <span class="font-semibold text-[15px]">ความดันโลหิตสูง</span>
                        </div>
                        <div class="font-bold text-xl text-apple-text"><span class="counter" id="dash-bp">0</span></div>
                    </div>

                    <div class="w-full h-[1px] bg-gray-100/80 my-0.5 ml-14"></div>

                    <div class="flex items-center justify-between p-3 px-4 hover:bg-black/[0.02] rounded-2xl transition-colors">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full bg-yellow-100 flex items-center justify-center text-yellow-600"><i class="fa-solid fa-tint text-sm"></i></div>
                            <span class="font-semibold text-[15px]">น้ำตาลผิดปกติ</span>
                        </div>
                        <div class="font-bold text-xl text-apple-text"><span class="counter" id="dash-dtx">0</span></div>
                    </div>

                    <div class="w-full h-[1px] bg-gray-100/80 my-0.5 ml-14"></div>

                    <div class="flex items-center justify-between p-3 px-4 bg-red-50/50 hover:bg-red-50 rounded-2xl transition-colors mt-1 border border-red-100/50">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full bg-red-500 flex items-center justify-center text-white shadow-sm"><i class="fa-solid fa-truck-medical text-sm"></i></div>
                            <span class="font-bold text-[15px] text-red-600">ควรส่งต่อพบแพทย์</span>
                        </div>
                        <div class="font-bold text-xl text-red-600"><span class="counter" id="dash-refer">0</span></div>
                    </div>

                </div>
            </div>

        </section>

        <!-- =======================
             SECTION: FORM WIZARD
             ======================= -->
        <section id="section-form" class="hidden">
            
            <div class="flex flex-col items-center mb-6">
                <h2 class="text-2xl font-bold text-apple-text tracking-tight mb-4" id="formTitle">บันทึกข้อมูลใหม่</h2>
                <!-- Apple Style Dots Indicator -->
                <div class="flex gap-2">
                    <div id="dot1" class="step-dot step-dot-active"></div>
                    <div id="dot2" class="step-dot step-dot-inactive"></div>
                    <div id="dot3" class="step-dot step-dot-inactive"></div>
                </div>
            </div>

            <div class="glass-panel rounded-[2rem] p-6 sm:p-8 shadow-glass relative overflow-hidden">
                <!-- Decorative Blur -->
                <div class="absolute -top-20 -right-20 w-40 h-40 bg-apple-blue/10 rounded-full blur-3xl pointer-events-none"></div>

                <form id="healthForm" onsubmit="submitForm(event)">
                    <input type="hidden" id="action" name="action" value="createRecord">
                    <input type="hidden" id="RecordID" name="RecordID" value="">
                    
                    <!-- STEP 1 -->
                    <div id="step1-content" class="transition-opacity duration-300">
                        <h3 class="text-lg font-bold mb-5 flex items-center"><span class="w-6 h-6 rounded-full bg-apple-text text-white text-[11px] flex items-center justify-center mr-2">1</span> ข้อมูลพื้นที่</h3>
                        <div class="space-y-4">
                            <div><label class="label-apple">วันที่ตรวจ <span class="text-apple-red">*</span></label><input type="date" id="checkDate" name="checkDate" class="input-apple" required></div>
                            <div><label class="label-apple">ชื่อวัด <span class="text-apple-red">*</span></label><input type="text" id="templeName" name="templeName" class="input-apple" placeholder="ระบุชื่อวัด" required></div>
                            <div class="grid grid-cols-2 gap-4">
                                <div><label class="label-apple">บ้าน</label><input type="text" id="village" name="village" class="input-apple"></div>
                                <div><label class="label-apple">หมู่ที่</label><input type="number" id="villageNo" name="villageNo" class="input-apple" inputmode="numeric"></div>
                            </div>
                            <div><label class="label-apple">ตำบล</label><input type="text" id="subDistrict" name="subDistrict" class="input-apple"></div>
                            
                            <div class="pt-4 border-t border-gray-100">
                                <div><label class="label-apple">ผู้สำรวจ / อสม.</label><input type="text" id="surveyorName" name="surveyorName" class="input-apple"></div>
                                <div class="mt-4"><label class="label-apple">เบอร์โทรผู้สำรวจ</label><input type="tel" id="surveyorPhone" name="surveyorPhone" class="input-apple" pattern="[0-9]{9,10}" inputmode="numeric"></div>
                                <div class="mt-4"><label class="label-apple">ผู้ลงข้อมูล <span class="text-apple-red">*</span></label><input type="text" id="recorderName" name="recorderName" class="input-apple !bg-blue-50/30" required></div>
                            </div>
                            
                            <button type="button" onclick="nextStep(2)" class="btn-apple-primary mt-8">ถัดไป</button>
                        </div>
                    </div>

                    <!-- STEP 2 -->
                    <div id="step2-content" class="hidden transition-opacity duration-300">
                        <h3 class="text-lg font-bold mb-5 flex items-center"><span class="w-6 h-6 rounded-full bg-apple-text text-white text-[11px] flex items-center justify-center mr-2">2</span> ข้อมูลพระสงฆ์</h3>
                        <div class="space-y-4">
                            <div><label class="label-apple">ชื่อ-สกุล (ฉายา) <span class="text-apple-red">*</span></label><input type="text" id="fullName" name="fullName" class="input-apple" placeholder="เช่น พระสมชาย สมจิตร" required></div>
                            <div><label class="label-apple">เลขหนังสือสุทธิ</label><input type="text" id="monkId" name="monkId" class="input-apple" inputmode="numeric"></div>
                            <div><label class="label-apple">เลขประจำตัวประชาชน</label><input type="text" id="idCard" name="idCard" class="input-apple" pattern="[0-9]{13}" inputmode="numeric" placeholder="13 หลัก"></div>
                            
                            <div class="grid grid-cols-5 gap-3">
                                <div class="col-span-3"><label class="label-apple">วันเกิด</label><input type="date" id="birthDate" name="birthDate" class="input-apple" onchange="calculateAge()"></div>
                                <div class="col-span-2"><label class="label-apple">อายุ</label><input type="number" id="ageDisplay" class="input-apple bg-gray-50 text-center font-bold" readonly placeholder="ปี"></div>
                            </div>
                            <div><label class="label-apple">เบอร์โทรติดต่อ</label><input type="tel" id="monkPhone" name="monkPhone" class="input-apple" pattern="[0-9]{9,10}" inputmode="numeric"></div>

                            <div class="flex gap-3 mt-8">
                                <button type="button" onclick="prevStep(1)" class="btn-apple-secondary w-1/3">ย้อนกลับ</button>
                                <button type="button" onclick="nextStep(3)" class="btn-apple-primary w-2/3">ถัดไป</button>
                            </div>
                        </div>
                    </div>

                    <!-- STEP 3 -->
                    <div id="step3-content" class="hidden transition-opacity duration-300">
                        <h3 class="text-lg font-bold mb-5 flex items-center"><span class="w-6 h-6 rounded-full bg-apple-text text-white text-[11px] flex items-center justify-center mr-2">3</span> ผลตรวจสุขภาพ</h3>
                        <div class="space-y-6">
                            
                            <!-- Health Block 1 -->
                            <div class="bg-white/50 rounded-2xl p-4 border border-gray-100">
                                <div class="flex justify-between items-center mb-3">
                                    <label class="label-apple !mb-0">BMI (น้ำหนัก/ส่วนสูง)</label>
                                    <div id="bmiResultBadge" class="badge-premium bp-gray">-</div>
                                </div>
                                <div class="flex items-center gap-3">
                                    <input type="number" step="0.1" id="weight" name="weight" class="input-apple text-center" inputmode="decimal" oninput="calcBMIUI()" placeholder="น้ำหนัก (กก.)">
                                    <input type="number" step="0.1" id="height" name="height" class="input-apple text-center" inputmode="decimal" oninput="calcBMIUI()" placeholder="ส่วนสูง (ซม.)">
                                </div>
                                <div class="mt-3 text-center text-sm font-semibold text-gray-500">BMI: <span id="bmiDisplay" class="text-apple-text text-lg ml-1">-</span></div>
                            </div>

                            <!-- Health Block 2 -->
                            <div class="bg-white/50 rounded-2xl p-4 border border-gray-100">
                                <div class="flex justify-between items-center mb-3">
                                    <label class="label-apple !mb-0">ความดันโลหิต (BP)</label>
                                    <div id="bpResultBadge" class="badge-premium bp-gray">-</div>
                                </div>
                                <div class="flex items-center gap-2">
                                    <input type="number" id="sbp" name="sbp" class="input-apple text-center !text-lg font-bold" inputmode="numeric" oninput="calcBPUI()" placeholder="SBP">
                                    <span class="text-2xl text-gray-300 font-light">/</span>
                                    <input type="number" id="dbp" name="dbp" class="input-apple text-center !text-lg font-bold" inputmode="numeric" oninput="calcBPUI()" placeholder="DBP">
                                </div>

                            <!-- Health Block 3 -->
                            <div class="bg-white/50 rounded-2xl p-4 border border-gray-100">
                                <div class="flex justify-between items-center mb-3">
                                    <label class="label-apple !mb-0">ระดับน้ำตาล (DTX)</label>
                                    <div id="dtxResultBadge" class="badge-premium bp-gray">-</div>
                                </div>
                                <select id="glucoseStatus" name="glucoseStatus" class="input-apple mb-3" onchange="calcDTXUI()">
                                    <option value="fasting">งดอาหาร > 8 ชม.</option>
                                    <option value="random">ไม่งดอาหาร/สุ่ม</option>
                                </select>
                                <input type="number" id="dtx" name="dtx" class="input-apple text-center !text-lg font-bold" inputmode="numeric" oninput="calcDTXUI()" placeholder="ค่า DTX (mg/dL)">

                            <!-- Chips -->

                                <div class="flex flex-wrap gap-2 mt-2">
                                    <label class="pill-checkbox cursor-pointer">

                                        <div class="px-4 py-2 rounded-full border border-gray-200 bg-white text-[13px] font-semibold text-gray-600">ไม่มี</div>
                                    </label>
                                    <label class="pill-checkbox cursor-pointer">
                                        <input type="checkbox" name="diseases" value="เบาหวาน" class="peer sr-only ds-check">
                                        <div class="px-4 py-2 rounded-full border border-gray-200 bg-white text-[13px] font-semibold text-gray-600">เบาหวาน</div>
                                    </label>
                                    <label class="pill-checkbox cursor-pointer">
                                        <input type="checkbox" name="diseases" value="ความดันโลหิตสูง" class="peer sr-only ds-check">
                                        <div class="px-4 py-2 rounded-full border border-gray-200 bg-white text-[13px] font-semibold text-gray-600">ความดันสูง</div>
                                    </label>
                                    <label class="pill-checkbox cursor-pointer">
                                        <input type="checkbox" name="diseases" value="ไขมันในเลือดสูง" class="peer sr-only ds-check">
                                        <div class="px-4 py-2 rounded-full border border-gray-200 bg-white text-[13px] font-semibold text-gray-600">ไขมันฯสูง</div>
                                    </label>
                                    <label class="pill-checkbox cursor-pointer">
                                        <input type="checkbox" name="diseases" value="โรคไต" class="peer sr-only ds-check">
                                        <div class="px-4 py-2 rounded-full border border-gray-200 bg-white text-[13px] font-semibold text-gray-600">โรคไต</div>
                                    </label>
                                </div>
                            </div>

                            <div>
                                <label class="label-apple">หมายเหตุ / อาการสำคัญ</label>
                                <textarea id="note" name="note" rows="2" class="input-apple resize-none rounded-2xl"></textarea>
                            </div>

                            <!-- PDPA iOS Style Toggle -->
                            <div class="flex items-start gap-3 p-4 bg-white/60 rounded-2xl border border-gray-100 mt-2">
                                <div class="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in mt-1">
                                    <input type="checkbox" name="toggle" id="consent" required class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 border-gray-200 appearance-none cursor-pointer transition-transform duration-300 ease-in-out checked:translate-x-6 checked:border-apple-blue shadow-sm"/>
                                    <label for="consent" class="toggle-label block overflow-hidden h-6 rounded-full bg-gray-200 cursor-pointer transition-colors duration-300 ease-in-out peer-checked:bg-apple-blue"></label>

                                <style>
                                    .toggle-checkbox:checked { right: 0; border-color: #0071e3; }
                                    .toggle-checkbox:checked + .toggle-label { background-color: #0071e3; }

                                <label for="consent" class="text-[11px] leading-relaxed text-apple-textMuted font-medium">
                                    ยืนยันขออนุญาตผู้รับการตรวจเพื่อจัดเก็บข้อมูลสุขภาพในการดูแลรักษาและส่งต่อข้อมูลตาม พ.ร.บ. คุ้มครองข้อมูลส่วนบุคคล (PDPA)
                                </label>

                            <div class="flex gap-3 mt-8">
                                <button type="button" onclick="prevStep(2)" class="btn-apple-secondary w-1/3">ย้อนกลับ</button>
                                <button type="submit" class="btn-apple-primary w-2/3 shadow-lg shadow-apple-blue/30">บันทึกข้อมูล</button>

                </form>
            </div>
        </section>

        <!-- =======================
             SECTION: RECORDS
             ======================= -->
        <section id="section-table" class="hidden space-y-4">
            
            <div class="sticky top-[70px] z-30 pt-2 pb-4 bg-[#f5f5f7]/90 backdrop-blur-md -mx-4 px-4">
                <div class="relative">
                    <i class="fa-solid fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="text" id="searchInput" placeholder="ค้นหาชื่อ, วัด..." class="w-full pl-11 pr-4 py-3 bg-white/80 border border-gray-200/50 rounded-2xl focus:outline-none focus:ring-2 focus:ring-apple-blue/30 shadow-sm text-[15px] font-medium backdrop-blur-sm">
                </div>
                <div class="flex gap-3 mt-3">
                    <button onclick="loadTableData()" class="flex-1 bg-white hover:bg-gray-50 border border-gray-200 text-gray-700 font-semibold py-2.5 rounded-xl text-[13px] shadow-sm transition-all active:scale-95"><i class="fa-solid fa-rotate-right mr-1"></i> โหลดใหม่</button>
                    <button onclick="exportCSV()" class="flex-1 bg-apple-text hover:bg-gray-800 text-white font-semibold py-2.5 rounded-xl text-[13px] shadow-sm transition-all active:scale-95"><i class="fa-solid fa-arrow-down-to-bracket mr-1"></i> ส่งออก CSV</button>
                </div>
            </div>

            <div id="listContainer" class="space-y-4 pb-10">
                <!-- Data Injected Here -->
            </div>

        </section>

    </main>

    <!-- Floating Island Navigation (Apple Style) -->
    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-sm nav-island rounded-full z-50 px-6 py-3 flex justify-between items-center pb-safe-offset">
        <button onclick="switchTab('dashboard')" id="nav-dashboard" class="flex flex-col items-center justify-center text-apple-blue w-16 transition-colors">
            <i class="fa-solid fa-chart-pie text-[22px] mb-1"></i>
            <span class="text-[10px] font-bold">สรุปผล</span>
        </button>
        
        <button onclick="switchTab('form'); resetForm();" class="bg-apple-text hover:bg-black text-white w-14 h-14 rounded-full flex justify-center items-center text-2xl shadow-[0_8px_20px_rgba(0,0,0,0.15)] active:scale-90 transition-all -mt-8 border-4 border-[#f5f5f7]">
            <i class="fa-solid fa-plus"></i>
        </button>
        
        <button onclick="switchTab('table')" id="nav-table" class="flex flex-col items-center justify-center text-gray-400 hover:text-gray-600 w-16 transition-colors">
            <i class="fa-solid fa-folder-open text-[22px] mb-1"></i>
            <span class="text-[10px] font-bold">ประวัติ</span>
        </button>
    </nav>
    <style>
        .pb-safe-offset { margin-bottom: env(safe-area-inset-bottom, 0); }
    </style>

    <!-- JS Logic -->
    <script>
        // Set Date
        const thOptions = { year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('currentDate').innerText = new Date().toLocaleDateString('th-TH', thOptions);

        // UI Navigation
        function switchTab(tabId) {
            document.getElementById('section-dashboard').classList.add('hidden');
            document.getElementById('section-form').classList.add('hidden');
            document.getElementById('section-table').classList.add('hidden');
            
            document.getElementById('nav-dashboard').classList.replace('text-apple-blue', 'text-gray-400');
            document.getElementById('nav-table').classList.replace('text-apple-blue', 'text-gray-400');

            document.getElementById('section-' + tabId).classList.remove('hidden');
            
            if(tabId !== 'form') {
                document.getElementById('nav-' + tabId).classList.replace('text-gray-400', 'text-apple-blue');
            }

            if (tabId === 'dashboard') loadDashboard();
            if (tabId === 'table') loadTableData();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Form Wizard Logic
        function nextStep(step) {
            if(step === 2) {
                if(!document.getElementById('checkDate').value) return showAppleAlert('กรุณาระบุวันที่ตรวจ');
                if(!document.getElementById('templeName').value) return showAppleAlert('กรุณาระบุชื่อวัด');
                if(!document.getElementById('recorderName').value) return showAppleAlert('กรุณาระบุชื่อผู้ลงข้อมูล');
            }
            if(step === 3) {
                if(!document.getElementById('fullName').value) return showAppleAlert('กรุณาระบุชื่อพระสงฆ์');
            }

            for(let i=1; i<=3; i++) {
                document.getElementById(`step${i}-content`).classList.add('hidden');
                document.getElementById(`dot${i}`).className = 'step-dot ' + (i === step ? 'step-dot-active' : 'step-dot-inactive');
            }
            document.getElementById(`step${step}-content`).classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function prevStep(step) {
            for(let i=1; i<=3; i++) {
                document.getElementById(`step${i}-content`).classList.add('hidden');
                document.getElementById(`dot${i}`).className = 'step-dot ' + (i === step ? 'step-dot-active' : 'step-dot-inactive');
            }
            document.getElementById(`step${step}-content`).classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Calc Functions
        function calculateAge() {
            const bdStr = document.getElementById('birthDate').value;
            if(!bdStr) return;
            const parts = bdStr.split("-");
            let y = parseInt(parts[0], 10);
            if(y > 2400) y -= 543;
            const bd = new Date(y, parseInt(parts[1])-1, parseInt(parts[2]));
            let age = new Date().getFullYear() - bd.getFullYear();
            const m = new Date().getMonth() - bd.getMonth();
            if (m < 0 || (m === 0 && new Date().getDate() < bd.getDate())) age--;
            document.getElementById('ageDisplay').value = age > 0 ? age : 0;
        }

        function getBadgeClassPremium(status) {
            if(!status) return 'bp-gray';
            if(status.includes("ปกติ") && !status.includes("ผิด")) return 'bp-green';
            if(status.includes("เริ่ม") || status.includes("เสี่ยง") || status.includes("ทั่วไป") || status.includes("เกิน")) return 'bp-yellow';
            if(status.includes("สูง") || status.includes("อ้วนระดับ 1")) return 'bp-orange';
            if(status.includes("วิกฤต") || status.includes("ส่งต่อ") || status.includes("สงสัย") || status.includes("อ้วนระดับ 2")) return 'bp-red';
            return 'bp-gray';
        }

        function calcBMIUI() {
            const w = parseFloat(document.getElementById('weight').value);
            let h = parseFloat(document.getElementById('height').value);
            const disp = document.getElementById('bmiDisplay');
            const res = document.getElementById('bmiResultBadge');
            
            if(!w || !h) { disp.innerText = "-"; res.className = "badge-premium bp-gray"; res.innerText="-"; return; }
            if(h >= 100) h = h/100;
            const bmi = (w / (h*h)).toFixed(2);
            disp.innerText = bmi;

            let text = "";
            if (bmi < 18.5) text = "น้ำหนักน้อย";
            else if (bmi <= 22.9) text = "ปกติ";
            else if (bmi <= 24.9) text = "น้ำหนักเกิน";
            else if (bmi <= 29.9) text = "อ้วนระดับ 1";
            else text = "อ้วนระดับ 2";

            res.className = `badge-premium ${getBadgeClassPremium(text)}`;
            res.innerText = text;
        }

        function calcBPUI() {
            const sbp = parseInt(document.getElementById('sbp').value);
            const dbp = parseInt(document.getElementById('dbp').value);
            const res = document.getElementById('bpResultBadge');

            if(!sbp || !dbp) { res.innerText = "-"; res.className="badge-premium bp-gray"; return; }
            let text = "";
            if (sbp >= 180 || dbp >= 120) text = "วิกฤต";
            else if (sbp >= 140 || dbp >= 90) text = "สูง ระดับ 2";
            else if (sbp >= 130 || dbp >= 80) text = "สูง ระดับ 1";
            else if (sbp >= 120 && dbp < 80) text = "เริ่มสูง";
            else text = "ปกติ";

            res.className = `badge-premium ${getBadgeClassPremium(text)}`;
            res.innerText = text;
        }

        function calcDTXUI() {
            const dtx = parseInt(document.getElementById('dtx').value);
            const status = document.getElementById('glucoseStatus').value;
            const res = document.getElementById('dtxResultBadge');
            const rec = document.getElementById('dtxRecDisplay');

            if(!dtx) { res.innerText = "-"; rec.innerText = "-"; res.className="badge-premium bp-gray"; return; }
            let text = "", rectext = "";

            if (status === "fasting") {
                if (dtx < 100) { text = "ปกติ"; rectext = "รักษาสุขภาพ ออกกำลังกาย"; }
                else if (dtx <= 125) { text = "เสี่ยงเบาหวาน"; rectext = "ควรคุมอาหารและติดตามซ้ำ"; }
                else { text = "สงสัยเบาหวาน"; rectext = "ส่งตรวจยืนยันที่ รพ."; }
            } else {
                if (dtx < 140) { text = "เกณฑ์ทั่วไป"; rectext = "รักษาสุขภาพ ออกกำลังกาย"; }
                else if (dtx <= 199) { text = "น้ำตาลสูง"; rectext = "ควรประเมินซ้ำแบบงดอาหาร"; }
                else { text = "สงสัยเบาหวาน"; rectext = "ส่งต่อเพื่อตรวจยืนยัน"; }
            }

            res.className = `badge-premium ${getBadgeClassPremium(text)}`;
            res.innerText = text;
            rec.innerText = rectext;
        }

        function handleDiseaseNone(cb) {
            const others = document.querySelectorAll('.ds-check');
            if(cb.checked) {
                others.forEach(c => { c.checked = false; c.disabled = true; });
            } else {
                others.forEach(c => c.disabled = false);
            }
        }

        // API Setup
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyn5FtZmP5e9PmXAAuQB6mwALIhzfiRixKEfIZPjVxS4Vry8pOiSt4dklJyL_-WXdA/exec"; // << URL Web App

        function showAppleAlert(msg, icon='warning') {
            Swal.fire({
                text: msg, icon: icon,
                confirmButtonColor: '#0071e3',
                customClass: { popup: 'rounded-3xl shadow-glass border border-gray-100', confirmButton: 'rounded-xl' }
            });
        }

        function callAPI(action, payload, callback) {
            document.getElementById('loader').style.display = 'flex';
            
            if (typeof google !== 'undefined' && google.script && google.script.run) {
                if(action.startsWith('get') || action === 'dashboard' || action === 'listRecords' || action === 'search') {
                    google.script.run.withSuccessHandler(r => { document.getElementById('loader').style.display = 'none'; handleResponse(r, callback); })
                        .withFailureHandler(e => { document.getElementById('loader').style.display = 'none'; showAppleAlert(e, 'error'); })
                        .doGet({ parameter: { action: action, ...payload } });
                } else {
                    google.script.run.withSuccessHandler(r => { document.getElementById('loader').style.display = 'none'; handleResponse(r, callback); })
                        .withFailureHandler(e => { document.getElementById('loader').style.display = 'none'; showAppleAlert(e, 'error'); })
                        .doPost({ parameter: { action: action }, postData: { contents: JSON.stringify(payload) } });
                }
            } else {
                if (!SCRIPT_URL) {
                    document.getElementById('loader').style.display = 'none';
                    return showAppleAlert('กรุณาตั้งค่า SCRIPT_URL', 'error');
                }
                let fetchOptions = {}, url = SCRIPT_URL + "?action=" + action;
                if(action.startsWith('get') || action === 'dashboard' || action === 'listRecords' || action === 'search') {
                    if(payload) for(let key in payload) url += `&${key}=${encodeURIComponent(payload[key])}`;
                    fetchOptions = { method: 'GET' };
                } else {
                    fetchOptions = { method: 'POST', body: JSON.stringify(payload), headers: { 'Content-Type': 'text/plain;charset=utf-8' } };
                }

                fetch(url, fetchOptions).then(r => r.json())
                    .then(r => { document.getElementById('loader').style.display = 'none'; handleResponse(JSON.stringify(r), callback); })
                    .catch(e => { document.getElementById('loader').style.display = 'none'; showAppleAlert(e, 'error'); });
            }
        }

        function handleResponse(resStr, callback) {
            try {
                const res = typeof resStr === 'string' ? JSON.parse(resStr) : resStr;
                if(res.success) { if(callback) callback(res.data); } 
                else { showAppleAlert(res.message, 'error'); }
            } catch(e) { showAppleAlert("Error formatting", 'error'); }
        }

        // Animate Counters
        function animateValue(id, start, end, duration) {
            if (start === end) return;
            let obj = document.getElementById(id);
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                // Ease out cubic
                const easeProgress = 1 - Math.pow(1 - progress, 3);
                obj.innerHTML = Math.floor(easeProgress * (end - start) + start);
                if (progress < 1) { window.requestAnimationFrame(step); }
            };
            window.requestAnimationFrame(step);
        }

        function updateDashCounters(data) {
            if(!data) return;
            const map = {
                'dash-total': data.totalMonks, 'dash-temples': data.totalTemples,
                'dash-bmi': data.highBmiCount, 'dash-bp': data.highBpCount,
                'dash-dtx': data.abnormalDtxCount, 'dash-refer': data.referCount
            };
            for(let id in map) {
                const el = document.getElementById(id);
                const current = parseInt(el.innerText) || 0;
                animateValue(id, current, map[id] || 0, 1500);
            }
        }

        function loadDashboard() {
            callAPI('dashboard', {}, function(data) { updateDashCounters(data); });
        }

        // Submit Form
        function submitForm(e) {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            data.diseases = Array.from(document.querySelectorAll('input[name="diseases"]:checked')).map(el => el.value);

            callAPI(data.action || 'createRecord', data, function() {
                showAppleAlert('บันทึกข้อมูลเรียบร้อยแล้ว', 'success');
                const keep = { r: data.recorderName, t: data.templeName, s: data.surveyorName, d: data.subDistrict };
                resetForm();
                document.getElementById('recorderName').value = keep.r;
                document.getElementById('templeName').value = keep.t;
                document.getElementById('surveyorName').value = keep.s;
                document.getElementById('subDistrict').value = keep.d;
                switchTab('dashboard');
            });
        }

        function resetForm() {
            document.getElementById('healthForm').reset();
            document.getElementById('action').value = 'createRecord';
            document.getElementById('RecordID').value = '';
            document.getElementById('checkDate').value = new Date().toISOString().slice(0,10);
            
            document.getElementById('ageDisplay').value = '';
            document.getElementById('bmiDisplay').innerText = '-';
            calcBMIUI(); calcBPUI(); calcDTXUI();
            document.querySelectorAll('input[type="checkbox"]').forEach(c => c.disabled = false);
            prevStep(1);
            document.getElementById('formTitle').innerText = 'บันทึกข้อมูลใหม่';
        }

        // List
        let currentRecords = [];
        function loadTableData() {
            callAPI('listRecords', {}, function(data) { currentRecords = data || []; renderList(currentRecords); });
        }

        function renderList(records) {
            const container = document.getElementById('listContainer');
            container.innerHTML = '';
            if(records.length === 0) {
                container.innerHTML = '<div class="text-center py-12 text-apple-textMuted font-medium glass-panel rounded-3xl">ไม่พบข้อมูล</div>';
                return;
            }
            records.forEach((r, idx) => {
                const dateStr = r["วันที่ตรวจ"] ? new Date(r["วันที่ตรวจ"]).toLocaleDateString('th-TH', {day:'numeric', month:'short', year:'2-digit'}) : "-";
                const bBMI = getBadgeClassPremium(r["แปลผล BMI"]);
                const bBP = getBadgeClassPremium(r["แปลผลความดันโลหิต"]);
                const bDTX = getBadgeClassPremium(r["แปลผล DTX"]);
                
                const card = document.createElement('div');
                card.className = "glass-panel p-5 rounded-3xl card-hover-effect reveal";
                card.style.animationDelay = Math.min(idx * 0.05, 0.4) + 's';
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-3">
                        <div class="flex-1">
                            <h3 class="font-bold text-apple-text text-lg tracking-tight leading-tight">${r["ชื่อ-สกุล"] || "-"}</h3>
                            <div class="text-[12px] text-apple-textMuted font-medium mt-1 flex items-center gap-1.5"><i class="fa-solid fa-vihara text-[10px]"></i> ${r["ชื่อวัด"] || "-"}</div>
                        </div>
                        <div class="text-right ml-2">
                            <div class="text-[11px] font-bold text-apple-textMuted uppercase tracking-wider bg-black/5 px-2 py-0.5 rounded-full inline-block">${dateStr}</div>
                            <div class="flex space-x-1 mt-2 justify-end">
                                <button onclick="editRecord('${r.RecordID}')" class="w-8 h-8 rounded-full bg-blue-50 text-apple-blue flex items-center justify-center active:scale-90 transition shadow-sm"><i class="fa-solid fa-pen text-[13px]"></i></button>
                                <button onclick="deleteRecordPrompt('${r.RecordID}')" class="w-8 h-8 rounded-full bg-red-50 text-apple-red flex items-center justify-center active:scale-90 transition shadow-sm"><i class="fa-solid fa-trash text-[13px]"></i></button>
                            </div>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-3 gap-2 border-t border-gray-100/50 pt-3">
                        <div class="flex flex-col gap-1 items-start">
                            <span class="text-[10px] text-gray-400 font-bold ml-1 uppercase">BMI</span>
                            <span class="badge-premium ${bBMI} w-full justify-center">${r["แปลผล BMI"] || "-"}</span>
                        </div>
                        <div class="flex flex-col gap-1 items-start">
                            <span class="text-[10px] text-gray-400 font-bold ml-1 uppercase">BP</span>
                            <span class="badge-premium ${bBP} w-full justify-center">${r["แปลผลความดันโลหิต"] || "-"}</span>
                        </div>
                        <div class="flex flex-col gap-1 items-start">
                            <span class="text-[10px] text-gray-400 font-bold ml-1 uppercase">DTX</span>
                            <span class="badge-premium ${bDTX} w-full justify-center">${r["แปลผล DTX"] || "-"}</span>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        document.getElementById('searchInput').addEventListener('input', function(e) {
            const kw = e.target.value.toLowerCase();
            const filtered = currentRecords.filter(r => (String(r["ชื่อ-สกุล"]||"").toLowerCase().includes(kw) || String(r["ชื่อวัด"]||"").toLowerCase().includes(kw) || String(r["ตำบล"]||"").toLowerCase().includes(kw)));
            renderList(filtered);
        });

        function editRecord(id) {
            const record = currentRecords.find(r => r.RecordID === id);
            if(!record) return;
            resetForm(); switchTab('form');
            document.getElementById('formTitle').innerText = 'แก้ไขข้อมูล';
            document.getElementById('action').value = 'updateRecord';
            document.getElementById('RecordID').value = id;

            if(record["วันที่ตรวจ"]) {
                const parts = String(record["วันที่ตรวจ"]).split(" ")[0].split("-");
                if(parts.length===3) document.getElementById('checkDate').value = String(record["วันที่ตรวจ"]).substring(0,10);
            }
            document.getElementById('templeName').value = record["ชื่อวัด"] || "";
            document.getElementById('village').value = record["บ้าน"] || "";
            document.getElementById('villageNo').value = record["หมู่ที่"] || "";
            document.getElementById('subDistrict').value = record["ตำบล"] || "";
            document.getElementById('surveyorName').value = record["ผู้สำรวจ"] || "";
            document.getElementById('surveyorPhone').value = record["เบอร์โทรผู้สำรวจ"] || "";
            document.getElementById('fullName').value = record["ชื่อ-สกุล"] || "";
            document.getElementById('monkId').value = record["เลขหนังสือสุทธิ"] || "";
            document.getElementById('idCard').value = record["เลขบัตรประจำตัวประชาชน"] || "";
            document.getElementById('monkPhone').value = record["เบอร์โทรพระสงฆ์"] || "";
            
            if(record["วันเดือนปีเกิด"]) {
                const parts = record["วันเดือนปีเกิด"].split(" ")[0].split("-");
                if(parts.length===3) document.getElementById('birthDate').value = record["วันเดือนปีเกิด"].substring(0,10);
            }

            document.getElementById('weight').value = record["น้ำหนัก"] || "";
            document.getElementById('height').value = record["ส่วนสูง"] || "";
            document.getElementById('sbp').value = record["ความดันตัวบน SBP"] || "";
            document.getElementById('dbp').value = record["ความดันตัวล่าง DBP"] || "";
            if(record["สถานะการตรวจน้ำตาล"]) document.getElementById('glucoseStatus').value = record["สถานะการตรวจน้ำตาล"];
            document.getElementById('dtx').value = record["ผลน้ำตาลปลายนิ้ว DTX"] || "";
            document.getElementById('note').value = record["หมายเหตุ"] || "";
            document.getElementById('recorderName').value = record["ผู้บันทึก"] || "";

            const dsStr = record["โรคประจำตัว"] || "";
            document.querySelectorAll('input[name="diseases"]').forEach(cb => { if(dsStr.includes(cb.value)) cb.checked = true; });
            if(dsStr.includes("ไม่มี")) handleDiseaseNone(document.querySelector('input[value="ไม่มี"]'));

            calculateAge(); calcBMIUI(); calcBPUI(); calcDTXUI();
            prevStep(1);
        }

        function deleteRecordPrompt(id) {
            Swal.fire({
                title: 'ยืนยันลบข้อมูล', text: "รายการนี้จะถูกซ่อนจากระบบ",
                icon: 'warning', showCancelButton: true,
                confirmButtonColor: '#ff3b30', cancelButtonColor: '#86868b',
                confirmButtonText: 'ลบข้อมูล', cancelButtonText: 'ยกเลิก',
                customClass: { popup: 'rounded-3xl shadow-glass border', confirmButton: 'rounded-xl', cancelButton: 'rounded-xl' }
            }).then((result) => {
                if (result.isConfirmed) {
                    callAPI('deleteRecord', { RecordID: id }, function() {
                        showAppleAlert('ลบข้อมูลสำเร็จ', 'success');
                        loadTableData(); loadDashboard();
                    });
                }
            });
        }

        function exportCSV() {
            if(currentRecords.length === 0) return;
            const headers = Object.keys(currentRecords[0]);
            let csvContent = "data:text/csv;charset=utf-8,\uFEFF" + headers.join(",") + "\n";
            currentRecords.forEach(r => {
                const row = headers.map(h => {
                    let cell = r[h] == null ? "" : String(r[h]);
                    if(h === "เลขบัตรประจำตัวประชาชน" && cell.length===13) cell = "xxxxxxxxx" + cell.substring(9);
                    cell = cell.replace(/"/g, '""');
                    if (cell.search(/("|,|\n)/g) >= 0) cell = `"${cell}"`;
                    return cell;
                });
                csvContent += row.join(",") + "\n";
            });
            const link = document.createElement("a");
            link.href = encodeURI(csvContent);
            link.download = `รายงานสุขภาพ_${new Date().toISOString().slice(0,10)}.csv`;
            link.click();
        }

        document.addEventListener('DOMContentLoaded', loadDashboard);
    </script>
</body>
</html>
